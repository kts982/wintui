name: Demo GIF

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  render-demo:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install ffmpeg
        shell: pwsh
        run: choco install ffmpeg -y --no-progress

      - name: Install ttyd
        shell: pwsh
        run: winget install --id tsl0922.ttyd --exact --accept-package-agreements --accept-source-agreements --disable-interactivity

      - name: Install VHS
        shell: pwsh
        run: |
          go install github.com/charmbracelet/vhs@v0.11.0
          echo "$((go env GOPATH))\bin" >> $env:GITHUB_PATH

      - name: Build WinTUI
        shell: pwsh
        run: go build -o wintui.exe .

      - name: Validate tape
        shell: pwsh
        run: vhs validate demo.tape

      - name: Render GIF
        shell: pwsh
        run: vhs demo.tape

      - name: Upload demo artifact
        uses: actions/upload-artifact@v4
        with:
          name: demo-gif
          path: demo.gif
          if-no-files-found: error
